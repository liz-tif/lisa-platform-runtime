<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platform as Runtime — Login</title>
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="pages.css">
  <link rel="stylesheet" href="transitions.css">
  <link rel="stylesheet" href="tooltips.css">
</head>
<body>
  <header class="site-nav">
    <a href="index.html" class="brand">Platform-as-Runtime</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="pricing.html">Pricing</a>
      <a href="profile.html">Profile</a>
      <a href="login.html" aria-current="page">Login</a>
    </nav>
  </header>

  <main class="page page-login">
    <div class="login-card">
      <h1>Willkommen zurück</h1>
      <p class="subtitle">Melde dich an, um deine Projekte zu sehen.</p>

      <form class="login-form" novalidate>
        <div class="field">
          <label for="email">E-Mail</label>
          <input type="email" id="email" name="email" placeholder="name@firma.com" required>
        </div>

        <div class="field">
          <label for="password">Passwort</label>
          <input type="password" id="password" name="password" placeholder="Mindestens 8 Zeichen" required minlength="8">
        </div>

        <button type="submit" class="btn btn-primary">Anmelden</button>

        <p class="forgot"><a href="#">Passwort vergessen?</a></p>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <p>Advanced CSS Cohort · Mai 2026</p>
  </footer>
</body>
</html>
